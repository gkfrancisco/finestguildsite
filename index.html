<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Finest · Ragnarok Builds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at 20% 10%, #1e2a32 1px, transparent 1px),
                        radial-gradient(circle at 80% 60%, #2a1e2e 1px, transparent 1px);
      background-size: 60px 60px, 90px 90px;
      background-color: #0c0f15;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e0e4e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
      letter-spacing: 0.2px;
    }

    .site-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .main-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #4a3a2c;
      padding: 0.8rem 2rem;
      margin-bottom: 2.5rem;
      background: rgba(8, 10, 15, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.7), 0 0 0 1px rgba(200, 160, 80, 0.15);
      z-index: 100;
      position: relative;
    }

    .logo-area { display: flex; align-items: baseline; gap: 0.2rem; }

    .site-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: #f5e6d3;
      text-shadow: 0 0 12px #b87c3a, 0 0 25px #5e3a1c;
      letter-spacing: 3px;
      line-height: 1;
    }

    .main-nav { display: flex; align-items: center; gap: 2rem; }
    .nav-list { display: flex; list-style: none; gap: 2rem; align-items: center; flex-wrap: wrap; }

    .nav-link {
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      color: #cfc3b0;
      padding: 0.5rem 0.2rem;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
    }

    .nav-link:hover {
      color: #f7d9a0;
      text-shadow: 0 0 8px #cf8b3c;
      border-bottom-color: #c99a4b;
    }

    /* Dropdown */
    .dropdown { position: relative; }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      background: linear-gradient(145deg, #1b1f2a 0%, #12161d 100%);
      border: 1px solid #5e4a34;
      border-radius: 18px;
      padding: 0.6rem 0;
      min-width: 190px;
      list-style: none;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.8);
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
      z-index: 101;
    }

    .dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }

    .dropdown-link {
      color: #d9cdb0;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }

    .dropdown-link:hover { background: rgba(200, 140, 50, 0.15); color: #ffd78b; }

    /* Content Card */
    .content-card {
      background: rgba(18, 22, 28, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid #4f3d2b;
      border-radius: 2.5rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.9);
      flex: 1;
    }

    .page-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.2rem;
      color: #ecd59b;
      margin-bottom: 1.2rem;
      border-left: 6px solid #b3823e;
      padding-left: 1.5rem;
    }

    /* Tabs Logic */
    .tabs-container { margin-top: 1.5rem; }
    .tabs-header { display: flex; gap: 8px; margin-bottom: -1px; overflow-x: auto; }
    
    .tab-btn {
      background: rgba(20, 25, 35, 0.9);
      border: 1px solid #4f3d2b;
      border-bottom: none;
      color: #b49b7b;
      padding: 12px 25px;
      border-radius: 15px 15px 0 0;
      cursor: pointer;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.85rem;
      transition: 0.3s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: rgba(18, 22, 28, 1);
      color: #f3cd81;
      border-color: #8b774f;
      border-bottom: 2px solid #12161c;
      position: relative;
      z-index: 2;
    }

    .tab-content {
      display: none;
      background: rgba(12, 15, 21, 0.4);
      border: 1px solid #8b774f;
      border-radius: 0 25px 25px 25px;
      padding: 2rem;
      animation: fadeInTab 0.4s ease forwards;
    }

    .tab-content.active { display: block; }

    @keyframes fadeInTab {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Build Styles */
    .build-sub-title {
      color: #dbb45c;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 1.2rem;
      margin: 1.5rem 0 1rem 0;
    }

    .stat-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(139, 119, 79, 0.2);
      margin-bottom: 1rem;
    }

    .stat-list li b { color: #f3cd81; }

    .card-list {
      list-style: none;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
    }

    .card-list li { margin-bottom: 8px; color: #c2b9a6; }
    .card-list b { color: #dbb45c; }

    .skillb-img { margin-top: 15px; }
    .skillb-img img {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      border: 1px solid #4a3a2c;
    }

    .placeholder-note {
      background: rgba(200, 155, 60, 0.08);
      border: 1px dashed #8b774f;
      border-radius: 20px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      color: #cfbc93;
    }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: #f5d7a0;
      text-decoration: underline;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .class-icon { font-size: 4rem; text-align: center; margin-bottom: 1rem; }

    @media (max-width: 700px) {
      .main-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .content-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="site-container">
    <header class="main-header">
      <div class="logo-area">
        <span class="site-title">FINEST</span>
      </div>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><button class="nav-link" data-page="home">🏠 Home</button></li>
          <li class="dropdown">
            <button class="nav-link">⚔️ Builds <span style="font-size:0.7rem;">▼</span></button>
            <ul class="dropdown-menu">
              <li><button class="dropdown-link" data-page="sinx">🗡️ SinX</button></li>
              <li><button class="dropdown-link" data-page="professor">📖 Professor</button></li>
            </ul>
          </li>
          <li><button class="nav-link" data-page="guides">📜 Guides</button></li>
          <li><button class="nav-link" data-page="about">🌙 About</button></li>
        </ul>
      </nav>
    </header>

    <main class="content-card" id="mainContent">
      </main>

    <div style="text-align:center; padding: 2rem; color: #6b6254; font-size: 0.85rem;">
      © Finest · 2026
    </div>
  </div>

  <script>

      const professorHTML = `

        <div class="tabs-container">
          <div class="tabs-header">
            <button class="tab-btn active" onclick="openTab(event, 'psychicTab')">🌀 Psychic Wave Build</button>

            </ul>

            <h3 class="build-sub-title">📜 Skill Build</h3>
            <div class="skillb-img"><img src="img/psych-sk1.png" /></div>
            <div class="skillb-img"><img src="img/psych-sk2.png" /></div>

            <div class="placeholder-note">

          <div id="bolterTab" class="tab-content">

              <li><b>STR:</b> 0</li><li><b>AGI:</b> 0</li><li><b>VIT:</b> 0</li>
              <li><b>INT:</b> 99</li><li><b>DEX:</b> 2</li><li><b>LUK:</b> 99</li>

            <h3 class="build-sub-title">📊 Stat Build (PVP)</h3>
            <ul class="stat-list">
              <li><b>STR:</b> 0</li><li><b>AGI:</b> 0</li><li><b>VIT:</b> 72</li>
              <li><b>INT:</b> 99</li><li><b>DEX:</b> 0</li><li><b>LUK:</b> 57</li>

            <ul class="card-list">
              <li><b>Element Fountain Magic Book</b></li>

           <h3 class="build-sub-title">🃏 Card Setup</h3>

              <li><b>Accessory:</b> 2x Wraith / 2 Greatest General | 1 Horong</li>
              <li><b>Headwear:</b> 2 Cramp / 2 Pharaoh Illu (or mixed)</li>
              <li><b>Costume/Back:</b> Deviling / Baphomet / GTB Puppet II</li>

            <div class="placeholder-note">
              <strong>Manual Skills:</strong><br>
              <div class="skillb-img" style="max-width: 220px;"><img src="img/psych-sk7.png" /></div><br>

              <span style="color:#f3cd81;">💡 Auto Skills:</span> Lightning Bolt (Strongest) or Bolt of your choice if countered.
            </div>
          </div>
          </div>
        </div>

        <button class="back-link" data-page="home">← Return Home</button>
      `;

      const pages = { home: homeHTML, sinx: sinxHTML, professor: professorHTML, guides: `<h1>Guides</h1>`, about: `<h1>About</h1>` };
      const mainContent = document.getElementById('mainContent');

      // Navigation Logic
      function navigateTo(pageName) {
        if (pages[pageName]) {
          mainContent.innerHTML = pages[pageName];
          window.scrollTo(0, 0);
          attachInternalListeners();
        }
      }

      function attachInternalListeners() {
        document.querySelectorAll('[data-page]').forEach(el => {
          el.onclick = (e) => { navigateTo(el.getAttribute('data-page')); };
        });
      }

      // Tab Logic (Globally accessible)
      window.openTab = function(evt, tabName) {
        const contents = document.querySelectorAll('.tab-content');
        contents.forEach(c => c.classList.remove('active'));
        
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => b.classList.remove('active'));

        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
      }

      navigateTo('home');
    })();
  </script>
</body>
</html>
