backend:
  name: git-gateway
  branch: main

# This disables the visual preview which causes the r.slice crash
publish_mode: simple
show_preview_links: false

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "builds"
    label: "Class Builds"
    folder: "content/builds"
    create: true
    editor:
      preview: false # This is the "kill switch" for the r.slice error
    extension: "html"
    format: "yaml-frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Content", name: "body", widget: "markdown" } 
      # Note: I changed 'code' to 'markdown'. 
      # You can still paste HTML into the Markdown "Raw" tab, 
      # but Markdown is much more stable in this CMS.