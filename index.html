<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Finest · Ragnarok Builds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0e14;
      background-image: radial-gradient(circle at 20% 10%, #1e2a32 1px, transparent 1px),
                        radial-gradient(circle at 80% 60%, #2a1e2e 1px, transparent 1px);
      background-size: 60px 60px, 90px 90px;
      background-color: #0c0f15;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e0e4e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
      letter-spacing: 0.2px;
    }

    .site-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header with z-index: 1 */
    .main-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #4a3a2c;
      padding-bottom: 1.2rem;
      margin-bottom: 2.5rem;
      background: rgba(8, 10, 15, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      padding: 0.8rem 2rem;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.7), 0 0 0 1px rgba(200, 160, 80, 0.15);
      z-index: 1;
      position: relative;
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
    }

    .site-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: #f5e6d3;
      text-shadow: 0 0 12px #b87c3a, 0 0 25px #5e3a1c;
      letter-spacing: 3px;
      line-height: 1;
    }

    .site-sub {
      font-size: 0.9rem;
      color: #b49b7b;
      margin-left: 0.5rem;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-list {
      display: flex;
      list-style: none;
      gap: 2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-item {
      position: relative;
    }

    .nav-link {
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      color: #cfc3b0;
      padding: 0.5rem 0.2rem;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.4px;
      cursor: pointer;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }

    .nav-link i {
      font-style: normal;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .nav-link:hover {
      color: #f7d9a0;
      text-shadow: 0 0 8px #cf8b3c;
      border-bottom-color: #c99a4b;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      background: #1a1e26;
      background: linear-gradient(145deg, #1b1f2a 0%, #12161d 100%);
      border: 1px solid #5e4a34;
      border-radius: 18px;
      padding: 0.6rem 0;
      min-width: 190px;
      list-style: none;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.8), 0 0 0 1px rgba(190, 140, 60, 0.4);
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
      z-index: 10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dropdown:hover .dropdown-menu,
    .dropdown:focus-within .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-item {
      padding: 0.5rem 1.5rem;
    }

    .dropdown-link {
      text-decoration: none;
      color: #d9cdb0;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1rem;
      transition: 0.2s;
      padding: 0.4rem 0.2rem;
      border-radius: 8px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .dropdown-link:hover {
      color: #ffd78b;
      background: rgba(200, 140, 50, 0.15);
      text-shadow: 0 0 6px #b87c3a;
    }

    .rune-icon {
      font-size: 1.1rem;
      filter: drop-shadow(0 0 4px #b8863c);
    }

    .content-card {
      background: rgba(18, 22, 28, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #4f3d2b;
      border-radius: 2.5rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.9), inset 0 1px 0 rgba(230, 200, 140, 0.2);
      flex: 1;
      transition: all 0.3s;
    }

    .page-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 2.2rem;
      font-weight: 700;
      color: #ecd59b;
      margin-bottom: 1.2rem;
      border-left: 6px solid #b3823e;
      padding-left: 1.5rem;
      text-shadow: 0 0 15px #3f2e1c;
    }

    .welcome-text {
      font-size: 1.2rem;
      color: #c2b9a6;
      margin-bottom: 2rem;
      max-width: 700px;
    }

    .placeholder-note {
      background: rgba(200, 155, 60, 0.08);
      border: 1px dashed #8b774f;
      border-radius: 20px;
      padding: 1.5rem 2rem;
      margin-top: 1.5rem;
      color: #cfbc93;
      font-style: italic;
    }

    .placeholder-note strong {
      color: #f3cd81;
      font-weight: 600;
    }

    .footer-note {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6b6254;
      border-top: 1px solid #362f24;
      padding-top: 1.8rem;
    }

    /* Class page styles (used when content is swapped) */
    .class-icon {
      font-size: 4rem;
      filter: drop-shadow(0 0 15px #b8863c);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .desc-box {
      background: rgba(0,0,0,0.4);
      border-radius: 1.5rem;
      padding: 1.8rem;
      margin: 1.8rem 0;
      border: 1px solid #5e4a34;
      color: #cfc3a8;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #f5d7a0;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid #b3823e;
      padding-bottom: 2px;
      transition: 0.2s;
      cursor: pointer;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
      font-size: 1rem;
    }

    .back-link:hover { color: #ffdfaa; }

    a {
      text-decoration: none;
    }

    @media (max-width: 700px) {
      .main-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .nav-list {
        gap: 1rem;
      }
      .content-card {
        padding: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="site-container">
    <header class="main-header">
      <div class="logo-area">
        <span class="site-title">FINEST</span>
        
      </div>
      <nav class="main-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li class="nav-item">
            <button class="nav-link" data-page="home">🏠 Home</button>
          </li>
          <li class="nav-item dropdown">
            <button class="nav-link" aria-haspopup="true" aria-expanded="false">
              ⚔️ Builds <span style="font-size:0.7rem; margin-left:2px;">▼</span>
            </button>
            <ul class="dropdown-menu">
              <li class="dropdown-item">
                <button class="dropdown-link" data-page="sinx">
                  <span class="rune-icon">🗡️</span> SinX
                </button>
              </li>
              <li class="dropdown-item">
                <button class="dropdown-link" data-page="professor">
                  <span class="rune-icon">📖</span> Professor
                </button>
              </li>
            </ul>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-page="guides">📜 Guides</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-page="about">🌙 About</button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="content-card" id="mainContent">
      <!-- Dynamic content will be injected here -->
    </main>
    <div class="footer-note">
      © Finest · 
    </div>
  </div>

  <script>
    (function() {
      // --- Page templates ---
      const homeHTML = `
        <h1 class="page-title">⚡ Finest</h1>
        <p class="welcome-text">
          Welcome to <strong>Finest</strong>
        </p>
        <div style="display: flex; gap: 2rem; flex-wrap: wrap; margin-top: 1.8rem;">
          <div style="flex: 1; min-width: 200px;">
            <h3 style="color: #dbb45c; font-family: 'Cinzel Decorative', cursive; margin-bottom: 0.7rem;">🗡️ SinX</h3>
            <p style="color: #b9aa8f;">Assassin Cross specialist. Crit, SBK, or Soul Destroyer builds.</p>
            <button class="back-link" data-page="sinx" style="color: #f5c27b; text-decoration: underline; font-weight: 500; background:none; border:none; cursor:pointer; padding:0; font-family:inherit;">Open SinX page →</button>
          </div>
          <div style="flex: 1; min-width: 200px;">
            <h3 style="color: #dbb45c; font-family: 'Cinzel Decorative', cursive; margin-bottom: 0.7rem;">📖 Professor</h3>
            <p style="color: #b9aa8f;">Sage evolution. Bolts, double casting, and support magic.</p>
            <button class="back-link" data-page="professor" style="color: #f5c27b; text-decoration: underline; font-weight: 500; background:none; border:none; cursor:pointer; padding:0; font-family:inherit;">Open Professor page →</button>
          </div>
        </div>
        <div class="placeholder-note">
          ⚡ <strong>SinX</strong> and <strong>Professor</strong> pages are ready. Click on them in the menu or below.
        </div>
      `;

      const sinxHTML = `
        <div class="class-icon">🗡️</div>
        <h1 class="page-title" style="border-left-color: #b3823e;">SinX</h1>
        <p style="color: #b49b7b; margin-bottom: 2rem; font-size: 1.1rem; text-align: center;">Assassin Cross · Guillotine Cross</p>
        <div class="desc-box">
          <p><strong>SinX (Assassin Cross)</strong> thrives in critical strikes and deadly poison.</p>
          <p>• <span style="color:#f3cd81;">Crit Build:</span> High AGI/LUK, Katar mastery.<br>
          • <span style="color:#f3cd81;">Soul Destroyer:</span> Hybrid INT/STR for burst.<br>
          • <span style="color:#f3cd81;">SBK Build:</span> Sonic Blow specialist.</p>
          <p style="margin-top:1rem;">Darkness thrives in the shadows of Finest.</p>
        </div>
        <div class="placeholder-note">
          ⚡ You can replace this content with your own SinX HTML later.
        </div>
        <button class="back-link" data-page="home">← Return to Finest</button>
      `;

      const professorHTML = `
        <div class="class-icon">📖</div>
        <h1 class="page-title" style="border-left-color: #b3823e;">Professor</h1>
        <p style="color: #b49b7b; margin-bottom: 2rem; font-size: 1.1rem; text-align: center;">Professor · Sorcerer</p>
        <div class="desc-box">
          <p><strong>Professor</strong> controls elements and disrupts magic.</p>
          <p>• <span style="color:#f3cd81;">Bolter:</span> Double Casting with high INT/DEX.<br>
          • <span style="color:#f3cd81;">Support:</span> Land Protector, Dispel, Spider Web.<br>
          • <span style="color:#f3cd81;">Spell Fist:</span> Unique melee-magic hybrid.</p>
          <p style="margin-top:1rem;">Knowledge is the ultimate weapon in Rune-Midgard.</p>
        </div>
        <div class="placeholder-note">
          ⚡ You can replace this content with your own Professor HTML later.
        </div>
        <button class="back-link" data-page="home">← Return to Finest</button>
      `;

      const guidesHTML = `
        <h1 class="page-title">📜 Guides</h1>
        <p class="welcome-text">Comprehensive leveling, equipment, and strategy guides coming soon.</p>
        <div class="placeholder-note">Guides section under construction. Check back later.</div>
        <button class="back-link" data-page="home">← Return to Finest</button>
      `;

      const aboutHTML = `
        <h1 class="page-title">🌙 About Finest</h1>
        <p class="welcome-text">A passion project dedicated to the finest Ragnarok Online builds and theorycrafting.</p>
        <div class="placeholder-note">Dark mode eternal. Rune-Midgard forever.</div>
        <button class="back-link" data-page="home">← Return to Finest</button>
      `;

      // Map page names to HTML content
      const pages = {
        home: homeHTML,
        sinx: sinxHTML,
        professor: professorHTML,
        guides: guidesHTML,
        about: aboutHTML
      };

      const mainContent = document.getElementById('mainContent');

      // Function to render a page
      function navigateTo(pageName) {
        if (pages[pageName]) {
          mainContent.innerHTML = pages[pageName];
          // Re-attach event listeners to any new buttons inside the content
          attachInternalListeners();
        }
      }

      // Attach click listeners to elements with data-page attribute
      function attachInternalListeners() {
        document.querySelectorAll('[data-page]').forEach(element => {
          // Avoid duplicate listeners
          element.removeEventListener('click', handlePageClick);
          element.addEventListener('click', handlePageClick);
        });
      }

      function handlePageClick(e) {
        const page = e.currentTarget.getAttribute('data-page');
        if (page) {
          e.preventDefault();
          navigateTo(page);
        }
      }

      // Initial page load
      navigateTo('home');

      // Global listener attachment (covers menu and dynamic content)
      attachInternalListeners();

      // Also ensure dropdown buttons work (they have data-page, so already covered)
    })();
  </script>
</body>
</html>
